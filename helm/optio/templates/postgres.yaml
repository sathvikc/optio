{{- if .Values.postgresql.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-postgres-credentials
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "optio.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ required "postgresql.auth.password is required when postgresql is enabled" .Values.postgresql.auth.password | quote }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Release.Name }}-postgres-data
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "optio.labels" . | nindent 4 }}
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: {{ .Values.postgresql.storage.size }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-postgres
  namespace: {{ .Values.namespace }}
  labels:
    app: postgres
    {{- include "optio.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      {{- with .Values.postgresql.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        fsGroupChangePolicy: OnRootMismatch
      initContainers:
        # Ensure the data volume is owned by uid/gid 999. Some CSI drivers
        # don't reliably apply fsGroup to pre-existing directories on the
        # mount, which leaves postgres unable to write and fails startup.
        - name: init-data-perms
          image: busybox:1.36
          securityContext:
            runAsNonRoot: false
            runAsUser: 0
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              # chown/chmod require these caps even when running as UID 0;
              # `drop: ALL` alone leaves root unable to change ownership.
              add:
                - CHOWN
                - FOWNER
                - DAC_OVERRIDE
          command: ['sh', '-c']
          args:
            - |
              mkdir -p /var/lib/postgresql/data/pgdata
              chown -R 999:999 /var/lib/postgresql/data
              chmod 700 /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
        {{- if .Values.postgresql.tls.enabled }}
        - name: init-tls
          image: busybox:1.36
          securityContext:
            runAsNonRoot: false
            runAsUser: 0
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                - CHOWN
                - FOWNER
                - DAC_OVERRIDE
          command: ['sh', '-c']
          args:
            - |
              cp /tls-secret/tls.crt /etc/postgres-tls/tls.crt
              cp /tls-secret/tls.key /etc/postgres-tls/tls.key
              chown 999:999 /etc/postgres-tls/tls.crt /etc/postgres-tls/tls.key
              chmod 600 /etc/postgres-tls/tls.key
              chmod 644 /etc/postgres-tls/tls.crt
          volumeMounts:
            - name: tls-secret
              mountPath: /tls-secret
              readOnly: true
            - name: postgres-tls
              mountPath: /etc/postgres-tls
        {{- end }}
      containers:
        - name: postgres
          image: "{{ .Values.postgresql.image.repository }}:{{ .Values.postgresql.image.tag }}"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          {{- if .Values.postgresql.tls.enabled }}
          args:
            - "-c"
            - "ssl=on"
            - "-c"
            - "ssl_cert_file=/etc/postgres-tls/tls.crt"
            - "-c"
            - "ssl_key_file=/etc/postgres-tls/tls.key"
            - "-c"
            - "ssl_min_protocol_version=TLSv1.3"
          {{- end }}
          env:
            - name: POSTGRES_DB
              value: {{ .Values.postgresql.auth.database }}
            - name: POSTGRES_USER
              value: {{ .Values.postgresql.auth.username }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-postgres-credentials
                  key: POSTGRES_PASSWORD
            # Use a subdirectory for PGDATA so initdb doesn't trip over
            # filesystem artifacts (e.g. lost+found on ext4 PVs).
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            {{- if .Values.postgresql.tls.enabled }}
            - name: postgres-tls
              mountPath: /etc/postgres-tls
              readOnly: true
            {{- end }}
          resources:
            {{- toYaml .Values.postgresql.resources | nindent 12 }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-postgres-data
        {{- if .Values.postgresql.tls.enabled }}
        - name: tls-secret
          secret:
            secretName: {{ .Release.Name }}-postgres-tls
        - name: postgres-tls
          emptyDir:
            medium: Memory
            sizeLimit: 1Mi
        {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-postgres
  namespace: {{ .Values.namespace }}
  labels:
    app: postgres
    {{- include "optio.labels" . | nindent 4 }}
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
{{- end }}
