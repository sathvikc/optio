{{- if .Values.redis.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-redis
  namespace: {{ .Values.namespace }}
  labels:
    app: redis
    {{- include "optio.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
      containers:
        - name: redis
          image: "{{ .Values.redis.image.repository }}:{{ .Values.redis.image.tag }}"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          {{- if or .Values.redis.tls.enabled .Values.redis.auth.enabled }}
          args:
            - redis-server
            {{- if .Values.redis.tls.enabled }}
            - --tls-port
            - "6379"
            - --port
            - "0"
            - --tls-cert-file
            - /etc/redis-tls/tls.crt
            - --tls-key-file
            - /etc/redis-tls/tls.key
            - --tls-ca-cert-file
            - /etc/redis-tls/ca.crt
            - --tls-protocols
            - "TLSv1.3"
            {{- end }}
            {{- if .Values.redis.auth.enabled }}
            - --requirepass
            - $(REDIS_PASSWORD)
            {{- end }}
          {{- end }}
          {{- if .Values.redis.auth.enabled }}
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-redis-auth
                  key: REDIS_PASSWORD
          {{- end }}
          ports:
            - containerPort: 6379
          {{- if .Values.redis.tls.enabled }}
          volumeMounts:
            - name: redis-tls
              mountPath: /etc/redis-tls
              readOnly: true
          {{- end }}
          resources:
            {{- toYaml .Values.redis.resources | nindent 12 }}
      {{- if .Values.redis.tls.enabled }}
      volumes:
        - name: redis-tls
          secret:
            {{- if and .Values.redis.tls.existingSecret (not .Values.redis.tls.autoGenerateCert) }}
            secretName: {{ .Values.redis.tls.existingSecret }}
            {{- else }}
            secretName: {{ .Release.Name }}-redis-tls
            {{- end }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-redis
  namespace: {{ .Values.namespace }}
  labels:
    app: redis
    {{- include "optio.labels" . | nindent 4 }}
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
{{- end }}
