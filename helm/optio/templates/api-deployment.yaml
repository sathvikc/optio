apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-api
  namespace: {{ .Values.namespace }}
  labels:
    app: optio-api
    {{- include "optio.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app: optio-api
  template:
    metadata:
      labels:
        app: optio-api
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if eq .Values.api.antiAffinity "hard" }}
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: optio-api
              topologyKey: kubernetes.io/hostname
      {{- else if eq .Values.api.antiAffinity "soft" }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: optio-api
                topologyKey: kubernetes.io/hostname
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          ports:
            - containerPort: {{ .Values.api.port }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            {{- if and .Values.postgresql.enabled .Values.postgresql.tls.enabled }}
            - name: pg-ca
              mountPath: /etc/optio
              readOnly: true
            {{- end }}
            {{- if and .Values.redis.enabled .Values.redis.tls.enabled }}
            - name: redis-tls-ca
              mountPath: /etc/redis-tls
              readOnly: true
            {{- end }}
          envFrom:
            - secretRef:
                name: {{ .Release.Name }}-config
            {{- if .Values.github.app.existingSecret }}
            - secretRef:
                name: {{ .Values.github.app.existingSecret }}
            {{- end }}
          env:
            - name: API_PORT
              value: {{ .Values.api.port | quote }}
            - name: API_HOST
              value: "0.0.0.0"
            - name: OPTIO_API_INTERNAL_URL
              value: "http://{{ .Release.Name }}-api:{{ .Values.api.port }}"
            - name: NODE_ENV
              value: "production"
            - name: LOG_LEVEL
              value: {{ .Values.api.env.LOG_LEVEL | quote }}
            - name: OPTIO_ENVOY_IMAGE
              value: "{{ .Values.agent.envoyProxy.image.repository }}:{{ .Values.agent.envoyProxy.image.tag }}"
            {{- if and .Values.redis.enabled .Values.redis.auth.enabled }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-redis-auth
                  key: REDIS_PASSWORD
            {{- end }}
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.api.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.api.port }}
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: tmp
          emptyDir: {}
        {{- if and .Values.postgresql.enabled .Values.postgresql.tls.enabled }}
        - name: pg-ca
          secret:
            secretName: {{ .Release.Name }}-postgres-tls
            items:
              - key: ca.crt
                path: pg-ca.crt
        {{- end }}
        {{- if and .Values.redis.enabled .Values.redis.tls.enabled }}
        - name: redis-tls-ca
          secret:
            {{- if and .Values.redis.tls.existingSecret (not .Values.redis.tls.autoGenerateCert) }}
            secretName: {{ .Values.redis.tls.existingSecret }}
            {{- else }}
            secretName: {{ .Release.Name }}-redis-tls
            {{- end }}
            items:
              - key: ca.crt
                path: ca.crt
        {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-api
  namespace: {{ .Values.namespace }}
  labels:
    app: optio-api
    {{- include "optio.labels" . | nindent 4 }}
spec:
  type: {{ .Values.api.service.type }}
  selector:
    app: optio-api
  ports:
    - port: {{ .Values.api.port }}
      targetPort: {{ .Values.api.port }}
      {{- if and (eq .Values.api.service.type "NodePort") .Values.api.service.nodePort }}
      nodePort: {{ .Values.api.service.nodePort }}
      {{- end }}
