{{- if and .Values.postgresql.enabled (not .Values.auth.disabled) (not .Values.postgresql.auth.password) }}
  {{- fail "postgresql.auth.password is required when auth is enabled. Set a strong password for production use." }}
{{- end }}
{{- include "optio.validateRequired" . }}
{{- include "optio.validateEncryptionKey" . }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-config
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "optio.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ include "optio.databaseUrl" . | quote }}
  REDIS_URL: {{ include "optio.redisUrl" . | quote }}
  {{- if and .Values.redis.enabled .Values.redis.tls.enabled }}
  REDIS_CA_CERT_PATH: "/etc/redis-tls/ca.crt"
  {{- end }}
  OPTIO_ENCRYPTION_KEY: {{ required "encryption.key is required" .Values.encryption.key | quote }}
  OPTIO_AGENT_IMAGE: "{{ .Values.agent.image.repository }}:{{ .Values.agent.image.tag }}"
  OPTIO_IMAGE_PULL_POLICY: {{ .Values.agent.imagePullPolicy | quote }}
  OPTIO_RUNTIME: "kubernetes"
  OPTIO_AUTH_DISABLED: {{ .Values.auth.disabled | quote }}
  {{- if .Values.publicUrl }}
  PUBLIC_URL: {{ .Values.publicUrl | quote }}
  {{- end }}
  {{- if .Values.auth.github.clientId }}
  GITHUB_OAUTH_CLIENT_ID: {{ .Values.auth.github.clientId | quote }}
  GITHUB_OAUTH_CLIENT_SECRET: {{ .Values.auth.github.clientSecret | quote }}
  {{- end }}
  {{- if .Values.auth.google.clientId }}
  GOOGLE_OAUTH_CLIENT_ID: {{ .Values.auth.google.clientId | quote }}
  GOOGLE_OAUTH_CLIENT_SECRET: {{ .Values.auth.google.clientSecret | quote }}
  {{- end }}
  {{- if .Values.auth.gitlab.clientId }}
  GITLAB_OAUTH_CLIENT_ID: {{ .Values.auth.gitlab.clientId | quote }}
  GITLAB_OAUTH_CLIENT_SECRET: {{ .Values.auth.gitlab.clientSecret | quote }}
  {{- end }}
  {{- /* GitHub App IDs must be quoted strings in values.yaml to avoid YAML float truncation */ -}}
  {{- if and .Values.github.app.id (not .Values.github.app.existingSecret) }}
  GITHUB_APP_ID: {{ .Values.github.app.id | toString | quote }}
  GITHUB_APP_CLIENT_ID: {{ .Values.github.app.clientId | toString | quote }}
  GITHUB_APP_CLIENT_SECRET: {{ .Values.github.app.clientSecret | toString | quote }}
  GITHUB_APP_INSTALLATION_ID: {{ .Values.github.app.installationId | toString | quote }}
  GITHUB_APP_PRIVATE_KEY: {{ .Values.github.app.privateKey | toString | quote }}
  {{- if .Values.github.app.botName }}
  GITHUB_APP_BOT_NAME: {{ .Values.github.app.botName | quote }}
  {{- end }}
  {{- if .Values.github.app.botEmail }}
  GITHUB_APP_BOT_EMAIL: {{ .Values.github.app.botEmail | quote }}
  {{- end }}
  {{- end }}
  {{- if .Values.webhook.githubSecret }}
  GITHUB_WEBHOOK_SECRET: {{ .Values.webhook.githubSecret | quote }}
  {{- end }}
  {{- if .Values.credentialSecret }}
  OPTIO_CREDENTIAL_SECRET: {{ .Values.credentialSecret | quote }}
  {{- else }}
  OPTIO_CREDENTIAL_SECRET: {{ printf "%s:credential-secret" .Values.encryption.key | sha256sum | quote }}
  {{- end }}
  # Agent PVC configuration (read by API server at runtime)
  OPTIO_AGENT_PVC_STORAGE_CLASS: {{ .Values.agent.pvc.storageClass | quote }}
  OPTIO_AGENT_PVC_SIZE: {{ .Values.agent.pvc.size | quote }}
  # Optio agent pod configuration
  OPTIO_POD_ENABLED: {{ .Values.optio.enabled | quote }}
